<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Visibility Checker — Smallware Co</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8e8;
    --text-muted: #888;
    --text-dim: #555;
    --accent: #d4a853;
    --accent-dim: rgba(212,168,83,0.12);
    --green: #4a9c6d;
    --green-bg: rgba(74,156,109,0.12);
    --green-text: #6dba8a;
    --amber: #b8862a;
    --amber-bg: rgba(184,134,42,0.12);
    --amber-text: #d4a853;
    --red: #9c4a4a;
    --red-bg: rgba(156,74,74,0.12);
    --red-text: #c47070;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; }

  .header { border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--mono); font-size: 13px; color: var(--text-muted); letter-spacing: 0.02em; }
  .logo span { color: var(--accent); }
  .badge { font-family: var(--mono); font-size: 11px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(212,168,83,0.25); padding: 3px 8px; border-radius: 4px; letter-spacing: 0.04em; }

  .main { max-width: 780px; margin: 0 auto; padding: 3rem 2rem; }

  .hero { margin-bottom: 2.5rem; }
  .hero h1 { font-family: var(--mono); font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 8px; letter-spacing: -0.02em; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 560px; }

  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .form-row { margin-bottom: 1rem; }
  .form-row:last-child { margin-bottom: 0; }

  label { display: block; font-size: 12px; font-family: var(--mono); color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  label .opt { font-size: 11px; color: var(--text-dim); text-transform: none; letter-spacing: 0; font-family: var(--sans); }

  input[type="url"], input[type="text"], input[type="password"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 14px; font-family: var(--sans); padding: 10px 12px; outline: none; transition: border-color 0.15s;
  }
  input[type="url"]:focus, input[type="text"]:focus, input[type="password"]:focus { border-color: var(--border-hover); }
  input::placeholder { color: var(--text-dim); }

  .provider-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  @media (max-width: 560px) { .provider-row { grid-template-columns: repeat(2, 1fr); } }

  .provider-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: var(--mono); font-size: 12px; padding: 10px 8px; cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s, background 0.15s; letter-spacing: 0.02em; }
  .provider-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .provider-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .provider-btn .provider-name { display: block; font-size: 13px; margin-bottom: 2px; }
  .provider-btn .provider-model { display: block; font-size: 10px; color: var(--text-dim); letter-spacing: 0.03em; }
  .provider-btn.active .provider-model { color: var(--amber-text); opacity: 0.7; }

  .zai-model-row { display: none; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .zai-model-row.visible { display: flex; }
  .zai-model-row label { margin-bottom: 0; white-space: nowrap; }
  select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 10px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--border-hover); }
  select option { background: #222; }

  .key-row { display: flex; gap: 8px; align-items: flex-end; }
  .key-row input { flex: 1; font-family: var(--mono); font-size: 13px; }
  .key-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; padding: 10px 12px; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
  .key-toggle:hover { border-color: var(--border-hover); color: var(--text); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  .run-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--radius); color: #0f0f0f; font-size: 14px; font-weight: 600; font-family: var(--mono); padding: 12px; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; }
  .run-btn:hover { opacity: 0.88; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { font-family: var(--mono); font-size: 13px; color: var(--text-muted); text-align: center; padding: 1rem 0; display: none; }
  .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 8px; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .error-msg { background: var(--red-bg); border: 1px solid rgba(156,74,74,0.3); border-radius: var(--radius); color: var(--red-text); font-size: 13px; padding: 10px 14px; margin-top: 1rem; display: none; font-family: var(--mono); }

  /* Results */
  .results { display: none; margin-top: 1.5rem; }
  .results-meta { font-size: 12px; font-family: var(--mono); color: var(--text-dim); margin-bottom: 1.25rem; letter-spacing: 0.02em; }
  .results-meta a { color: var(--accent); text-decoration: none; }

  /* Score card */
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
  .score-number { font-family: var(--mono); font-size: 56px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .score-number.high { color: var(--green-text); }
  .score-number.medium { color: var(--amber-text); }
  .score-number.low { color: var(--red-text); }
  .score-label { font-family: var(--mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .score-verdict { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 500px; margin: 0 auto 1rem; }
  .score-disclaimer { font-family: var(--mono); font-size: 11px; color: var(--text-dim); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 4px; line-height: 1.6; }

  /* Check rows */
  .checks-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .check-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .check-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .check-name { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .check-pts { font-family: var(--mono); font-size: 12px; }
  .check-pts.full { color: var(--green-text); }
  .check-pts.partial { color: var(--amber-text); }
  .check-pts.zero { color: var(--red-text); }
  .check-detail { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .check-flag { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; margin-bottom: 6px; }
  .check-flag.pass { background: var(--green-bg); color: var(--green-text); }
  .check-flag.partial { background: var(--amber-bg); color: var(--amber-text); }
  .check-flag.fail { background: var(--red-bg); color: var(--red-text); }

  /* Recommendations */
  .reco-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
  .reco-title { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .reco-item { font-size: 13px; color: var(--text-muted); padding: 6px 0; border-bottom: 1px solid var(--border); line-height: 1.6; display: flex; gap: 10px; }
  .reco-item:last-child { border-bottom: none; }
  .reco-num { font-family: var(--mono); font-size: 11px; color: var(--accent); min-width: 20px; padding-top: 2px; }

  .footer { border-top: 1px solid var(--border); padding: 1rem 2rem; text-align: center; font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-top: 4rem; }
  .footer a { color: var(--text-muted); text-decoration: none; }
  .footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">smallware<span>.</span>co</div>
  <div class="badge">v0.1 — light</div>
</header>

<main class="main">
  <div class="hero">
    <h1>llm-<em>visibility</em>-checker</h1>
    <p>Estimates the likelihood that LLMs will cite your content. Runs three checks — domain recognition, citation likelihood, and page signals — scored into a single visibility estimate.</p>
  </div>

  <div class="form-section">
    <div class="form-row">
      <label for="inp-url">Content URL</label>
      <input type="url" id="inp-url" placeholder="https://yoursite.com/your-post" autocomplete="off" />
    </div>
    <div class="form-row">
      <label for="inp-keyword">Topic / keyword <span class="opt">(optional — improves citation check accuracy)</span></label>
      <input type="text" id="inp-keyword" placeholder="e.g. happy path testing, bug reports, local LLM setup" autocomplete="off" />
    </div>

    <hr class="divider">

    <div class="form-row">
      <label>LLM provider</label>
      <div class="provider-row">
        <button class="provider-btn active" onclick="selectProvider('anthropic', this)">
          <span class="provider-name">Claude</span>
          <span class="provider-model">claude-sonnet-4-6</span>
        </button>
        <button class="provider-btn" onclick="selectProvider('openai', this)">
          <span class="provider-name">ChatGPT</span>
          <span class="provider-model">gpt-4o</span>
        </button>
        <button class="provider-btn" onclick="selectProvider('gemini', this)">
          <span class="provider-name">Gemini</span>
          <span class="provider-model">gemini-2.0-flash</span>
        </button>
        <button class="provider-btn" onclick="selectProvider('zai', this)">
          <span class="provider-name">Z.AI</span>
          <span class="provider-model">glm-4.7-flash</span>
        </button>
      </div>
    </div>

    <div class="zai-model-row" id="zai-model-row">
      <label for="zai-model">Model</label>
      <select id="zai-model">
        <option value="glm-4-flash">GLM-4-Flash (fast)</option>
        <option value="glm-4.7-flash" selected>GLM-4.7-Flash</option>
        <option value="glm-4.7">GLM-4.7</option>
        <option value="glm-4.6">GLM-4.6</option>
      </select>
    </div>

    <div class="form-row">
      <label for="inp-key">API key <span class="opt" id="key-hint">(Anthropic — session only, not stored)</span></label>
      <div class="key-row">
        <input type="password" id="inp-key" placeholder="sk-ant-..." autocomplete="off" />
        <button class="key-toggle" onclick="toggleKey(event)">show</button>
      </div>
    </div>

    <div class="form-row" style="margin-top:1.25rem;">
      <button class="run-btn" id="run-btn" onclick="runCheck()">run visibility check</button>
    </div>
  </div>

  <div class="status" id="status">
    <span class="dot"></span> <span id="status-text">running checks...</span>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="results" id="results"></div>
</main>

<footer class="footer">
  <a href="https://smallware-co.github.io" target="_blank">smallware.co</a> &mdash; built by <a href="https://engineeredai.net" target="_blank">engineeredai.net</a>
</footer>

<script>
/**
 * llm-visibility-checker v0.1 — light
 * Estimates LLM citation likelihood via three checks:
 * 1. Domain recognition — does the LLM know this site exists (no URL in prompt)
 * 2. Citation likelihood — does the LLM cite this domain for the topic
 * 3. Page signals — schema/JSON-LD present on the page (via fetch)
 *
 * Scoring: 0-100 points. Directional estimate, not ground truth.
 * For verified AI citation data, use Bing Webmaster Tools > AI Performance.
 */

let currentProvider = 'anthropic';

const PROVIDERS = {
  anthropic: { label: 'Claude', model: 'claude-sonnet-4-6', placeholder: 'sk-ant-...', hint: 'Anthropic — session only, not stored' },
  openai:    { label: 'ChatGPT', model: 'gpt-4o', placeholder: 'sk-...', hint: 'OpenAI — session only, not stored' },
  gemini:    { label: 'Gemini', model: 'gemini-2.0-flash', placeholder: 'AIza...', hint: 'Google AI Studio — session only, not stored' },
  zai:       { label: 'Z.AI', model: 'glm-4.7-flash', placeholder: 'Z.AI API key', hint: 'Z.AI (BigModel) — session only, not stored' }
};

function selectProvider(id, btn) {
  currentProvider = id;
  document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const p = PROVIDERS[id];
  document.getElementById('inp-key').value = '';
  document.getElementById('inp-key').placeholder = p.placeholder;
  document.getElementById('key-hint').textContent = p.hint;
  document.getElementById('zai-model-row').className = 'zai-model-row' + (id === 'zai' ? ' visible' : '');
}

function toggleKey(e) {
  const inp = document.getElementById('inp-key');
  const btn = e.target;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'hide'; }
  else { inp.type = 'password'; btn.textContent = 'show'; }
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return ''; }
}

function getSlugWords(url) {
  try {
    return new URL(url).pathname.split('/').filter(Boolean)
      .flatMap(p => p.split('-')).filter(w => w.length > 3);
  } catch(e) { return []; }
}

function getTopic(keyword, url) {
  if (keyword && keyword.trim()) return keyword.trim();
  const words = getSlugWords(url);
  return words.slice(0, 5).join(' ') || getDomain(url);
}

/* — API callers — */

async function callAnthropic(apiKey, prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 800, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('');
}

async function callOpenAI(apiKey, prompt) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model: 'gpt-4o', max_tokens: 800, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function callGemini(apiKey, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts.map(p => p.text).join('');
}

async function callZAI(apiKey, prompt) {
  const model = document.getElementById('zai-model').value;
  const res = await fetch('https://api.z.ai/api/coding/paas/v4/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model, max_tokens: 800, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function callLLM(apiKey, prompt) {
  if (currentProvider === 'anthropic') return callAnthropic(apiKey, prompt);
  if (currentProvider === 'openai') return callOpenAI(apiKey, prompt);
  if (currentProvider === 'gemini') return callGemini(apiKey, prompt);
  if (currentProvider === 'zai') return callZAI(apiKey, prompt);
}

/* — Check 1: Domain recognition
   Ask about the domain with no URL in prompt.
   If domain appears in response = model knows it from training data.
   Points: 0, 20, or 35
*/
async function checkDomainRecognition(apiKey, domain, topic) {
  const siteName = domain.split('.')[0];
  const prompt = `What do you know about the website "${domain}"? Describe what it covers, who runs it, and what kind of content it publishes. Be honest if you have no knowledge of it.`;
  const response = await callLLM(apiKey, prompt);
  const lower = response.toLowerCase().replace(/www\./g, '');

  // Check if model shows genuine knowledge vs admits ignorance
  const knowsIt = lower.includes(domain.toLowerCase()) || lower.includes(siteName.toLowerCase());
  const admitsIgnorance = /don't have|do not have|no (specific |direct )?knowledge|not familiar|not aware|no information|cannot find|can't find/i.test(response);
  const fabricated = /likely|probably|appears to be|seems to be|based on the (domain|name)|i would guess|i can infer/i.test(response);

  let pts, flag, detail;

  if (knowsIt && !admitsIgnorance && !fabricated) {
    pts = 35; flag = 'pass';
    detail = 'Model has genuine knowledge of this domain from training data.';
  } else if (fabricated || (knowsIt && admitsIgnorance)) {
    pts = 20; flag = 'partial';
    detail = 'Model inferred details from the domain name — not confirmed training data recall.';
  } else {
    pts = 0; flag = 'fail';
    detail = 'Model has no knowledge of this domain. It is not present in training data or too new to be indexed.';
  }

  return { pts, flag, detail, response };
}

/* — Check 2: Citation likelihood
   Ask about the topic with no URL. See if domain is cited naturally.
   Points: 0, 25, or 40
*/
async function checkCitationLikelihood(apiKey, domain, topic) {
  const prompt = `What are the best online resources, blogs, or websites to learn about "${topic}"? List specific sites or URLs you would recommend.`;
  const response = await callLLM(apiKey, prompt);
  const lower = response.toLowerCase().replace(/www\./g, '');
  const siteName = domain.split('.')[0];

  const cited = lower.includes(domain.toLowerCase());
  const siteHit = siteName.length > 3 && lower.includes(siteName.toLowerCase());

  let pts, flag, detail;

  if (cited) {
    pts = 40; flag = 'pass';
    detail = `Model cited ${domain} as a recommended resource for this topic without being prompted.`;
  } else if (siteHit) {
    pts = 25; flag = 'partial';
    detail = `Model referenced the site name but not the full domain. Partial citation signal.`;
  } else {
    pts = 0; flag = 'fail';
    detail = `Model did not cite ${domain} for this topic. Other sources were recommended instead.`;
  }

  return { pts, flag, detail, response };
}

/* — Check 3: Page signals
   Fetch the page, check for schema/JSON-LD, meta description, og tags.
   Points: 0, 10, or 25
*/
async function checkPageSignals(url) {
  try {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const html = data.contents || '';

    const hasJsonLd = /<script[^>]*type=["']application\/ld\+json["'][^>]*>/i.test(html);
    const hasMetaDesc = /<meta[^>]*name=["']description["'][^>]*content=["'][^"']{10,}/i.test(html);
    const hasOgTags = /<meta[^>]*property=["']og:/i.test(html);
    const hasSchema = /schema\.org/i.test(html);

    const signals = [hasJsonLd, hasMetaDesc, hasOgTags, hasSchema].filter(Boolean).length;

    let pts, flag, detail, found = [];
    if (hasJsonLd || hasSchema) found.push('JSON-LD / Schema.org');
    if (hasMetaDesc) found.push('meta description');
    if (hasOgTags) found.push('Open Graph tags');

    if (signals >= 3) { pts = 25; flag = 'pass'; detail = `Strong page signals found: ${found.join(', ')}.`; }
    else if (signals >= 1) { pts = 10; flag = 'partial'; detail = `Some page signals found: ${found.join(', ')}. Missing structured data may reduce LLM parsability.`; }
    else { pts = 0; flag = 'fail'; detail = 'No schema, JSON-LD, or meta signals detected. Page may be difficult for LLMs to parse and categorize.'; }

    return { pts, flag, detail };
  } catch(e) {
    return { pts: 0, flag: 'partial', detail: 'Could not fetch page to check signals. Check manually.' };
  }
}

/* — Score rendering — */
function scoreClass(score) {
  if (score >= 65) return 'high';
  if (score >= 35) return 'medium';
  return 'low';
}

function scoreVerdict(score, domain) {
  if (score >= 65) return `${domain} has a good chance of being cited by LLMs. The model shows recognition and citation signals for this content.`;
  if (score >= 35) return `${domain} has partial LLM visibility. Some signals are present but gaps exist — addressing the recommendations below can improve citation likelihood.`;
  return `${domain} has low LLM visibility. The model does not recognize this domain or cite it for the topic. Focus on the recommendations below.`;
}

function ptsClass(flag) {
  if (flag === 'pass') return 'full';
  if (flag === 'partial') return 'partial';
  return 'zero';
}

function buildRecommendations(d1, d2, d3) {
  const recos = [];
  if (d1.flag === 'fail') recos.push('Build domain authority signals — get cited by established sites, publish consistently, and ensure your site is crawlable by AI training bots.');
  if (d1.flag === 'partial') recos.push('Model inferred your domain from its name. Strengthen brand mentions across the web — guest posts, directories, and syndication help get your domain into LLM training data.');
  if (d2.flag === 'fail') recos.push('Your domain is not being recommended for this topic. Create stronger topical authority — publish more depth on this subject and build internal linking around it.');
  if (d2.flag === 'partial') recos.push('Model recognizes your brand but doesn\'t cite your domain directly. Ensure your domain name and site name are consistent across all platforms.');
  if (d3.flag === 'fail') recos.push('Add JSON-LD structured data and Schema.org markup to your pages. Machine-readable content is a strong LLM visibility signal.');
  if (d3.flag === 'partial') recos.push('Improve page signals — add or complete JSON-LD, Open Graph tags, and a descriptive meta description for better LLM parsability.');
  if (recos.length === 0) recos.push('Signals look good. Monitor AI citation performance in Bing Webmaster Tools > AI Performance for real-world citation data.');
  return recos;
}

function renderResults(url, domain, topic, d1, d2, d3, provider, modelLabel) {
  const total = Math.min(100, d1.pts + d2.pts + d3.pts);
  const sc = scoreClass(total);
  const recos = buildRecommendations(d1, d2, d3);
  const now = new Date().toLocaleTimeString();

  const checkHTML = (name, maxPts, d) => `
    <div class="check-row">
      <div class="check-header">
        <span class="check-name">${name}</span>
        <span class="check-pts ${ptsClass(d.flag)}">${d.pts} / ${maxPts} pts</span>
      </div>
      <span class="check-flag ${d.flag}">${d.flag === 'pass' ? '✓ pass' : d.flag === 'partial' ? '~ partial' : '✗ fail'}</span>
      <div class="check-detail">${d.detail}</div>
    </div>`;

  return `
    <div class="results-meta">tested via ${provider} (${modelLabel}): <a href="${url}" target="_blank">${url}</a> — ${now}</div>

    <div class="score-card">
      <div class="score-number ${sc}">${total}</div>
      <div class="score-label">visibility estimate</div>
      <div class="score-verdict">${scoreVerdict(total, domain)}</div>
      <div class="score-disclaimer">
        ⓘ This score is a directional estimate based on LLM reasoning and page signal checks — not a live crawl or search index. 
        Results reflect training data signals at the time of the model's last update. 
        For verified AI citation data, use Bing Webmaster Tools → AI Performance.
      </div>
    </div>

    <div class="checks-list">
      ${checkHTML('Check 1 — Domain Recognition', 35, d1)}
      ${checkHTML('Check 2 — Citation Likelihood', 40, d2)}
      ${checkHTML('Check 3 — Page Signals', 25, d3)}
    </div>

    <div class="reco-section">
      <div class="reco-title">// recommendations</div>
      ${recos.map((r, i) => `<div class="reco-item"><span class="reco-num">${String(i+1).padStart(2,'0')}</span><span>${r}</span></div>`).join('')}
    </div>`;
}

/* — Main — */
async function runCheck() {
  const url = document.getElementById('inp-url').value.trim();
  const keyword = document.getElementById('inp-keyword').value.trim();
  const apiKey = document.getElementById('inp-key').value.trim();
  const errEl = document.getElementById('error-msg');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const resultsEl = document.getElementById('results');
  const runBtn = document.getElementById('run-btn');

  function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
  errEl.style.display = 'none';
  resultsEl.style.display = 'none';

  if (!url) { showError('Please enter a content URL.'); return; }
  try { new URL(url); } catch(e) { showError('Please enter a valid URL (include https://).'); return; }
  if (!apiKey) { showError('Please enter your API key for ' + PROVIDERS[currentProvider].label + '.'); return; }

  const domain = getDomain(url);
  const topic = getTopic(keyword, url);
  const p = PROVIDERS[currentProvider];
  const modelLabel = currentProvider === 'zai' ? document.getElementById('zai-model').value : p.model;

  runBtn.disabled = true;
  statusEl.style.display = 'block';

  try {
    statusText.textContent = 'check 1/3 — domain recognition...';
    const d1 = await checkDomainRecognition(apiKey, domain, topic);

    statusText.textContent = 'check 2/3 — citation likelihood...';
    const d2 = await checkCitationLikelihood(apiKey, domain, topic);

    statusText.textContent = 'check 3/3 — page signals...';
    const d3 = await checkPageSignals(url);

    statusEl.style.display = 'none';
    resultsEl.innerHTML = renderResults(url, domain, topic, d1, d2, d3, p.label, modelLabel);
    resultsEl.style.display = 'block';
  } catch(e) {
    statusEl.style.display = 'none';
    showError('API error: ' + e.message);
  }

  runBtn.disabled = false;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') runCheck(); });
</script>
